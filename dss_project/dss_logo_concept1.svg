<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="none"/>

  <!-- Outer Border (Brutalism) -->
  <rect x="10" y="10" width="180" height="180" fill="none" stroke="#0f172a" stroke-width="2"/>

  <!-- Stress Wave (Red/Amber) transforming to Calm Line (Emerald) -->
  <!-- Top: Stressed wavy lines -->
  <path d="M 30 70 Q 40 60 50 70 T 70 70" fill="none" stroke="#facc15" stroke-width="3" stroke-linecap="round"/>
  <path d="M 30 85 Q 40 75 50 85 T 70 85" fill="none" stroke="#facc15" stroke-width="3" stroke-linecap="round"/>

  <!-- Middle: Transition zone with diagonal slash -->
  <line x1="80" y1="50" x2="120" y2="110" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>

  <!-- Bottom: Calm smooth lines (Emerald) -->
  <path d="M 130 90 Q 140 100 150 90 T 170 90" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <path d="M 130 105 Q 140 115 150 105 T 170 105" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>

  <!-- Accent circle (Navy) at bottom right -->
  <circle cx="160" cy="150" r="12" fill="none" stroke="#0f172a" stroke-width="2"/>
</svg>